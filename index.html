<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Professional portfolio website." />
  <meta name="theme-color" content="#050505" />
  <title>Portfolio</title>

  <link rel="stylesheet" href="style.css" />

  <script defer src="profile.js"></script>
  <script defer src="about.js"></script>
  <script defer src="skills.js"></script>
  <script defer src="experience.js"></script>
  <script defer src="education.js"></script>
  <script defer src="contact.js"></script>
  <script defer src="talent.js"></script>
  <script defer src="main.js"></script>
</head>

<div id="talentOverlay" class="talent-overlay" aria-hidden="true">
  <div class="talent-screen">
    <div class="talent-topbar">
      <h2>Talent</h2>
      <button id="closeTalent" class="close-talent-btn">Close</button>
    </div>

    <p class="talent-subtitle">Choose which talent you want to view.</p>

    <div class="talent-choice-wrap">
      <button class="talent-choice active" data-tab="singing">Singing</button>
      <button class="talent-choice" data-tab="dancing">Dancing</button>
    </div>

    <div class="talent-view">
      <div class="talent-group active" id="talent-singing"></div>
      <div class="talent-group" id="talent-dancing"></div>
    </div>
  </div>
</div>

<body>
  <header class="site-header">
    <div class="container nav">
      <a href="#hero" class="brand" id="brandName">Portfolio</a>

      <nav class="nav-links" aria-label="Main navigation">
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#experience">Experience</a>
        <a href="#education">Education</a>
        <a href="#contact">Contact</a>
        <a href="#" id="openTalent">Talent</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="hero" class="hero"></section>
    <section id="about" class="section"></section>
    <section id="skills" class="section"></section>
    <section id="experience" class="section"></section>
    <section id="education" class="section"></section>
    <section id="contact" class="section"></section>
    <section id="talent" class="section"></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p id="footerText"></p>
    </div>
  </footer>
</body>
</html>
